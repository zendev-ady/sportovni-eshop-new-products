<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Dashboard{% endblock %} — B2B Sync</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <script src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js" defer></script>
  <style>
    [x-cloak] { display: none !important; }
    .nav-link {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 0.75rem; border-radius: 0.375rem;
      font-size: 0.875rem; color: rgb(148 163 184);
      transition: background 0.15s, color 0.15s;
    }
    .nav-link:hover  { background: rgb(30 41 59); color: rgb(248 250 252); }
    .nav-link.active { background: rgb(30 41 59); color: rgb(248 250 252); font-weight: 500; }
    .stat-card { @apply bg-white rounded-xl border border-slate-100 shadow-sm p-5; }
    .btn-primary { @apply inline-flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors; }
    .btn-secondary { @apply inline-flex items-center gap-2 px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium rounded-lg transition-colors; }
    .btn-danger { @apply inline-flex items-center gap-2 px-4 py-2 bg-red-600 hover:bg-red-700 text-white text-sm font-medium rounded-lg transition-colors; }
    .btn-warning { @apply inline-flex items-center gap-2 px-4 py-2 bg-amber-500 hover:bg-amber-600 text-white text-sm font-medium rounded-lg transition-colors; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">
<div class="flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <aside class="w-56 bg-slate-900 text-slate-300 flex flex-col shrink-0 shadow-xl">
    <div class="px-5 py-5 border-b border-slate-700/60">
      <div class="text-white font-semibold text-sm tracking-wide">B2B Sync</div>
      <div class="text-slate-400 text-xs mt-0.5">sportovni-eshop.cz</div>
    </div>

    <nav class="flex-1 px-3 py-4 space-y-0.5">
      <a href="/"         class="nav-link {% if active == 'sync' %}active{% endif %}">
        <span class="text-base">🔗</span> Synchronizace
      </a>
      <a href="/overview" class="nav-link {% if active == 'overview' %}active{% endif %}">
        <span class="text-base">📊</span> Dashboard
      </a>
      <a href="/logs"     class="nav-link {% if active == 'logs' %}active{% endif %}">
        <span class="text-base">📋</span> Logy
      </a>
      <a href="/history"  class="nav-link {% if active == 'history' %}active{% endif %}">
        <span class="text-base">🕒</span> Historie
      </a>
      <a href="/cache"    class="nav-link {% if active == 'cache' %}active{% endif %}">
        <span class="text-base">🗄️</span> Cache
      </a>
    </nav>

    <div class="px-5 py-4 border-t border-slate-700/60">
      <a href="/logs/download" class="text-xs text-slate-400 hover:text-slate-200 transition-colors">
        ↓ Stáhnout sync.log
      </a>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 overflow-y-auto bg-slate-50">
    {% block content %}{% endblock %}
  </main>

</div>
</body>
</html>
